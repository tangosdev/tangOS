name: Build + publish macOS

# electron-builder can only produce a macOS app on macOS, so the Intel (x64) and Apple
# Silicon (arm64) .dmg builds are made here on a macOS runner and published to the public
# bmanus2-dotcom/tangos-console Releases (the same feed the Windows build publishes to, so
# Mac users download + auto-update from one place).
#
# Trigger manually from the Actions tab, or automatically on a version tag (e.g.
# `git tag v3.1.13 && git push --tags`). It publishes into the release matching the version
# in console/package.json, adding the Mac assets next to the Windows ones.
#
# Requires a repo secret RELEASE_TOKEN: a fine-grained PAT with Contents: write on the
# tangos-console repo (this source repo's own GITHUB_TOKEN cannot write to a different repo).
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-13 # Intel host: uses the amd64 app-builder helper (the arm64 one ENOENTs on
    # macos-latest with electron-builder 25) and still cross-builds the arm64 dmg fine.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build + publish Intel (x64) and Apple Silicon (arm64) dmgs
        run: npm run console:dist:mac
        env:
          # No Apple Developer cert in CI: build unsigned. Users bypass Gatekeeper via
          # right-click > Open (or `xattr -cr "/Applications/tangOS Console.app"`).
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          # Cross-repo publish token: a PAT with Contents:write on tangos-console.
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      - name: Upload dmgs as a backup artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tangos-console-mac
          path: console/release/*.dmg
          if-no-files-found: warn
